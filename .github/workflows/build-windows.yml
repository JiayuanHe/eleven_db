name: Build Windows

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Debug - Show npm version
        run: |
          Write-Host "npm version:"
          npm --version
          Write-Host "node version:"
          node --version

      - name: Clean node_modules
        if: steps.cache.outputs.cache-hit != 'true'
        run: Remove-Item -Recurse -Force node_modules -ErrorAction SilentlyContinue

      - name: Install dependencies with retry
        run: |
          $retries = 3
          for ($i=1; $i -le $retries; $i++) {
            Write-Host "Attempt $i of $retries..."
            try {
              npm install --prefer-offline 2>&1
              exit 0
            } catch {
              Write-Host "Failed, retrying..."
              Start-Sleep -Seconds 5
            }
          }
          Write-Host "All retries failed"
          exit 1

      - name: Build
        run: |
          npm run build:main
          npm run build:renderer

      - name: Build Windows NSIS
        run: npx electron-builder --win nsis --x64

      - name: Build Windows Portable
        run: npx electron-builder --win portable --x64

      - name: List built files
        run: Get-ChildItem -Path release -Filter "*.exe" | Format-Table Name, Length -AutoSize

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-files
          path: |
            release/*.exe
            release/*.blockmap

  release:
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/**/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
