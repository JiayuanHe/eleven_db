<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 圆角背景 -->
  <rect x="16" y="16" width="480" height="480" rx="112" ry="112" fill="url(#bg)"/>
  <!-- 高光斜纹 -->
  <rect x="16" y="16" width="480" height="480" rx="112" ry="112" fill="url(#shimmer)"/>
  <!-- 数字 "11" -->
  <text
    x="256" y="370"
    text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
    font-weight="800"
    font-size="280"
    letter-spacing="-12"
    fill="#ffffff"
    filter="url(#shadow)">11</text>
  <!-- 圆点点缀（呼应 splash 上的小圆点） -->
  <circle cx="256" cy="436" r="6" fill="rgba(255,255,255,0.9)"/>
</svg>